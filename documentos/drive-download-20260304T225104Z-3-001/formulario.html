<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Con este atributo, 
    podemos colocar una descripción acerca de 
    nuestro sitio web">

    <title>Título de la página</title>
    <!--El contenido de la etiqueta
        se verá en la pestaña del navegador-->
</head>
<style>

    body{

        display: flex;
        justify-content: center;
    }
    div{
        width: 500px;
        height: 445px;
        background-color: rgb(255, 208, 0);
    }
    header,footer{
        display: flex;
        justify-content: center;
        background-color: darkblue;
        color: white;
    }
    input{
        margin-top: 2%;
        margin-bottom: 2%;
    }

    .boton{
        position: relative;
        background-color: black;
        color: #ffc000; 
        border: none;
        cursor: pointer;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
        width: 120px;
        height: 25px;
        transition-property: width, background-color;
        transition-duration: 0.5s;
    }

    .boton:hover{
        background-color: darkblue;
        width: 130px;
    }
</style>
<body>

    <div>
        <header>
            Formulario de ejemplo
        </header>
        <center>
        <form action="ejemplo.php" method="POST">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" required>
            <br>
            <label for="apellido">Apellido:</label>
            <input type="text" name="apellido" id="apellido" required>
            <br>
            <label for="correo">Correo:</label>
            <input type="email" name="correo" id="correo" required>
            <br>
            <p>Indique su género</p>
            <label for="masculino">Masculino</label>
            <input type="radio" name="genero" id="masculino" required>
            <br>
            <label for="femenino">Femenino</label>
            <input type="radio" name="genero" id="femenino" required>
            <br>
            <label for="edad">Edad (máximo 18-30 años): </label>
            <input type="number" name="edad" id="edad" min="18" max="30" required>
            <br>
            <label for="color">Color preferido: </label>
            <input type="color" name="color" id="edad">
            <br>
            <label for="archivo">Suba uno o más archivos: </label>
            <input type="file" name="archivo" id="archivo" multiple>
            <br>
            <input class="boton" type="submit" value="Registrarse">
        </form>
        </center>
        <footer>
            Todos los campos a excepción de los dos últimos son obligatorios
        </footer>
    </div>

</body>
</html>

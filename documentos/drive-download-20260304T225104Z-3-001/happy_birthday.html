<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    div{
        position: relative;
        top: 0px;
        right: 0px;
        width: 300px;
        height: 150px;

        background-color: rgba(36, 22, 235, 0.4);
        animation-name: animacion1;
        animation-duration: 14s;
        animation-iteration-count: infinite;
    }
    p{
        font-family: Georgia, 'Times New Roman', Times, serif;
        cursor: default;
        font-size: 25px;
    }

    @keyframes animacion {
        0% {top: 0px; right: 0px;   background-color: rgba(157, 22, 235, 0.4);}
        25% {top: 500px; right: 0px;  background-color: rgba(36, 22, 235, 0.4);}
        50% {top: 0px; right: -1050px;  background-color: rgba(22, 235, 129, 0.4);}
        75% {top: 500px; right: -1050px; background-color: rgba(22, 132, 235, 0.4);}
        100% {top: 0px; right: 0px;  background-color: rgba(196, 235, 22, 0.4);}
    }

    @keyframes animacion1 {
        0% {top: 0px; right: 0px;   background-color: rgba(157, 22, 235, 0.4);}
        25% {top: 505px; right: -510px;  background-color: rgba(22, 235, 129, 0.4);}
        50% {top: 0px; right: -1050px;  background-color: rgba(36, 22, 235, 0.4);}
        75% {top: 505px; right: -510px;  background-color: rgba(196, 235, 22, 0.4);}
        100% {top: 0px; right: 0px; background-color: rgba(22, 132, 235, 0.4);}

    }

    button{
        margin-top: 10%;
position: relative;
background-color: black;
color: #ffc000;
border: none;
cursor: pointer;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
font-size: 18px;
width: 200px;
height: 30px;
transition-property: background-color, color, font-size;
transition-duration: 1s;
}

button:hover{
background-color: #ffc000;
color: black;
font-size: 20px;
}

</style>
<body>

        <div>
            <center>
            <p>C днем рождения</p>
            <p>Happy birthday</p>
            <p>Feliz Cumpleaños</p>
            <center style="margin-top: 10%;"></center>
                <p>Diana, Lana</p>
            </center>
        </center>
        </div>

        <center>
            <button>Cambiar Animación</button>
            <p>хорошего дня</p>
        </center>


    <script>
        
        var logic = true;

        document.querySelector("button").onclick = ()=>{
            
            document.querySelector("div").style.animationName = logic? "animacion" : "animacion1"
            logic = !logic
        }


    </script>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            padding: 0;
            margin: 0;
        }

        #perimetro{
            width: 550px;
            height: 400px;
            border-style: solid;
            border-color: red;
        }

        #superior{
            display: flex;
            width: 100%;
            height: 15vh;
            align-items: center;
            justify-content: center;
        }

        #medio{
            width: 99.5%;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-style: solid;
            border-color: blue;
        }

        .direccion{
            margin-left: 1%;
            margin-left: 1%;
            border-style: solid;
            border-color: black;
        }
        #figura{
            position: relative;
            width: 50px;
            height: 50px;
            background-color: green;
        }
    </style>
</head>
<body>
    <div id="superior">
        <div id="izquierda" class="direccion">izquierda</div>
        <div id="derecha" class="direccion">derecha</div>
        <div id="abajo" class="direccion">abajo</div>
        <div id="arriba" class="direccion">arriba</div>
    </div>
    <div id="medio">
        <div id="perimetro">
            <div id="figura"></div>
        </div>
    </div>

    <script>

        const der = document.querySelector("#derecha")
        const ar = document.querySelector("#arriba")
        const ab = document.querySelector("#abajo")
        const izq = document.querySelector("#izquierda")

        const figura = document.querySelector("#figura")

        figura.style.top = "0px"
        figura.style.left = "0px"

        function colorear(a,b,c,d){
            a.style.backgroundColor = "gold";
            b.style.backgroundColor = "white";
            c.style.backgroundColor = "white";
            d.style.backgroundColor = "white";
        }

        window.onkeydown = (tecla)=>{
            
            if(tecla.keyCode=="39" && figura.style.left !="500px"){//derecha
                figura.style.left = String(parseInt(figura.style.left)+50)+"px"
                colorear(der,izq,ar,ab)
            }
            else if(tecla.keyCode =="40" && figura.style.top !="350px"){//abajo
                figura.style.top = String(parseInt(figura.style.top)+50)+"px"
                colorear(ab,izq,ar,der)
            }
            else if(tecla.keyCode =="38" && figura.style.top !="0px"){//arriba
                figura.style.top = String(parseInt(figura.style.top)-50)+"px"
                colorear(ar,izq,der,ab)
            }
            else if(tecla.keyCode =="37" && figura.style.left !="0px"){//izquierda
                figura.style.left = String(parseInt(figura.style.left)-50)+"px"
                colorear(izq,der,ar,ab)
            }
        }


    </script>


</body>
</html>
